version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: inventori-mysql
    environment:
      MYSQL_ROOT_PASSWORD: alif
      MYSQL_DATABASE: inventori_lab
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: inventori-lab-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/inventori_lab
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: alif
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
