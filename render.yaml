services:
  - type: web
    name: inventori-lab-backend
    env: docker
    repo: https://github.com/xnors32/BE-Java-mvn-spring-boot.git
    branch: main
    plan: free
    region: singapore
    healthCheckPath: /api/peminjaman
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        value: https://frontend-baru.vercel.app
      - key: JWT_SECRET
        generateValue: true
